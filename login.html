<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

.box{
    width:380px;
    margin:80px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0077cc;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:25px;
    background:#0077cc;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#005fa3;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<form id="loginForm">

<label>Email</label>

<input
type="email"
id="email"
placeholder="admin@clinic.com"
required>

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
