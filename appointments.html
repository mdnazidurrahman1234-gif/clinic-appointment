<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment List</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

h2{
    color:#0077cc;
    margin:0;
}

.logout{
    background:red;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.logout:hover{
    background:#c40000;
}

.back{
    display:inline-block;
    margin-bottom:15px;
    background:#0077cc;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:5px;
}

.search{
    width:100%;
    padding:10px;
    margin-bottom:20px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:5px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#0077cc;
    color:white;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

.delete:hover{
    background:#c40000;
}

</style>

</head>

<body>

<div class="container">

<a href="index.html" class="back">← Book Appointment</a>

<div class="top">

<h2>Appointment List</h2>

<button class="logout" onclick="logout()">

Logout

</button>

</div>

<input
type="text"
id="search"
class="search"
placeholder="Search Patient..."
onkeyup="searchAppointment()">

<table>

<thead>

<tr>

<th>Patient</th>

<th>Phone</th>

<th>Doctor</th>

<th>Date</th>

<th>Time</th>

<th>Action</th>

</tr>

</thead>

<tbody id="appointmentTable">

</tbody>

</table>

</div>

<script type="module" src="auth.js"></script>

<script type="module" src="script.js"></script>

</body>

</html>
