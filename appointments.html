<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment List</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0077cc;
}

.search{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    font-size:16px;
    box-sizing:border-box;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#0077cc;
    color:white;
}

button{
    border:none;
    padding:6px 12px;
    cursor:pointer;
    border-radius:5px;
    color:white;
}

.edit{
    background:orange;
}

.delete{
    background:red;
}

.back{
    display:inline-block;
    margin-bottom:15px;
    background:#0077cc;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:5px;
}

</style>

</head>


<body>


<div class="container">


<a href="index.html" class="back">
← Book Appointment
</a>


<h2>
Appointment List
</h2>


<input

type="text"

id="search"

class="search"

placeholder="Search by Patient Name or Phone Number..."

onkeyup="searchAppointment()"


>



<table>


<thead>


<tr>

<th>Patient</th>

<th>Phone</th>

<th>Doctor</th>

<th>Date</th>

<th>Time</th>

<th>Actions</th>

</tr>


</thead>


<tbody id="appointmentTable">


</tbody>


</table>


</div>



<script type="module" src="script.js"></script>



<script>


window.searchAppointment = function(){


    let value = document
    .getElementById("search")
    .value
    .toLowerCase()
    .trim();



    let rows = document
    .querySelectorAll("#appointmentTable tr");



    rows.forEach(row=>{


        let patient = row.cells[0]
        ? row.cells[0].innerText.toLowerCase()
        : "";



        let phone = row.cells[1]
        ? row.cells[1].innerText.toLowerCase()
        : "";



        if(
            patient.includes(value) ||
            phone.includes(value)
        ){

            row.style.display="";

        }

        else{

            row.style.display="none";

        }


    });


}


</script>



</body>
</html>
